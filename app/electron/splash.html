<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestorIA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #f6f7f8;
      font-family: "Plus Jakarta Sans", "Segoe UI", -apple-system, sans-serif;
      color: #0f172a;
      user-select: none;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 36px 52px 32px;
    }

    /* ── Logo ────────────────────────────────── */
    .logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-bottom: 14px;
    }

    /* ── Title ───────────────────────────────── */
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 3px;
      color: #0f1b2d;
    }

    .tagline {
      color: #64748b;
      font-size: 12px;
      margin-bottom: 32px;
    }

    /* ── Progress area ───────────────────────── */
    .progress-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status {
      font-size: 12px;
      color: #475569;
      transition: color 0.2s;
    }
    .status.error { color: #ef4444; }

    .percent {
      font-size: 12px;
      font-weight: 600;
      color: #0f1b2d;
    }

    .progress-wrap {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #0f1b2d, #3b82f6);
      border-radius: 99px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Version ─────────────────────────────── */
    .version {
      position: absolute;
      bottom: 14px;
      font-size: 10px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="../public/app-logo.png" alt="GestorIA"
         onerror="this.style.display='none'" />
    <h1>GestorIA</h1>
    <p class="tagline">Gestión inteligente para tu asesoría</p>

    <div class="progress-header">
      <span class="status" id="status">Iniciando…</span>
      <span class="percent" id="percent">0%</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="bar"></div>
    </div>
  </div>
  <p class="version">v1.0</p>

  <script>
    const bar     = document.getElementById('bar');
    const status  = document.getElementById('status');
    const percent = document.getElementById('percent');

    function updateProgress(pct, text) {
      bar.style.width = pct + '%';
      percent.textContent = Math.round(pct) + '%';
      if (text) status.textContent = text;
      status.classList.remove('error');
    }

    function showDone() {
      bar.style.background = 'linear-gradient(90deg, #16a34a, #4ade80)';
      bar.style.width = '100%';
      percent.textContent = '100%';
      status.textContent = '¡Todo listo!';
    }

    function showError(msg) {
      bar.style.background = '#ef4444';
      bar.style.width = '100%';
      status.classList.add('error');
      status.textContent = msg;
    }
  </script>
</body>
</html>
