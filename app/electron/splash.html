<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestorIA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #2d5a45;
      font-family: "Plus Jakarta Sans", "Segoe UI", -apple-system, sans-serif;
      user-select: none;
      overflow: hidden;
      -webkit-app-region: drag;
      transition: opacity 0.6s ease;
    }

    /* ── Banner ocupa todo el fondo ─────────── */
    .banner {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* ── Overlay en la zona inferior ─────────── */
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 36px 28px;
      background: linear-gradient(to top, rgba(15,27,45,0.72) 0%, transparent 100%);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      transition: color 0.2s;
    }
    .status.error { color: #f87171; }

    .percent {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .progress-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #a8c5b0, #ffffff);
      border-radius: 99px;
      width: 0%;
    }

    body.fading-out {
      opacity: 0;
    }

    body.fading-out .footer {
      opacity: 0;
      transform: translateY(10px);
    }

  </style>
</head>
<body>
  <img class="banner" src="../public/app-banner.png" alt=""
       onerror="document.body.style.background='#2d5a45'" />

  <div class="footer">
    <div class="progress-header">
      <span class="status" id="status">Iniciando…</span>
      <span class="percent" id="percent">0%</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="bar"></div>
    </div>
  </div>

  <script>
    const bar     = document.getElementById('bar');
    const status  = document.getElementById('status');
    const percent = document.getElementById('percent');

    let current = 0;   // valor actualmente dibujado
    let target  = 0;   // valor al que nos dirigimos
    let rafId   = null;
    let creepId = null;

    /* Anima current → target con easing suave */
    function _animate() {
      rafId = null;
      const diff = target - current;
      if (Math.abs(diff) < 0.05) {
        current = target;
      } else {
        current += diff * 0.10;   // 10 % del tramo restante por fotograma
        rafId = requestAnimationFrame(_animate);
      }
      bar.style.width   = current.toFixed(2) + '%';
      percent.textContent = Math.round(current) + '%';
    }

    function _scheduleAnimate() {
      if (!rafId) rafId = requestAnimationFrame(_animate);
    }

    /* Actualización directa (llamada desde main.cjs) */
    function updateProgress(pct, text) {
      _stopCreep();
      target = pct;
      if (text) { status.textContent = text; status.classList.remove('error'); }
      _scheduleAnimate();
    }

    /* Avance lento mientras esperamos una operación larga */
    function startCreep(maxPct, step = 0.35, intervalMs = 180) {
      _stopCreep();
      creepId = setInterval(() => {
        if (current < maxPct - step) {
          target = Math.min(target + step, maxPct);
          _scheduleAnimate();
        } else {
          _stopCreep();
        }
      }, intervalMs);
    }

    function _stopCreep() {
      if (creepId) { clearInterval(creepId); creepId = null; }
    }

    function showDone() {
      _stopCreep();
      bar.style.background = 'linear-gradient(90deg, #4ade80, #bbf7d0)';
      target = 100;
      _scheduleAnimate();
      status.textContent = '¡Todo listo!';
    }

    function fadeOutSplash() {
      document.body.classList.add('fading-out');
    }

    function showError(msg) {
      _stopCreep();
      bar.style.background = '#f87171';
      target = 100; current = 100;
      bar.style.width = '100%';
      status.classList.add('error');
      status.textContent = msg;
    }
  </script>
</body>
</html>
