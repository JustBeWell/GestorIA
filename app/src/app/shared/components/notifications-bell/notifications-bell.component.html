<div class="notifications-root">
  <button type="button" class="bell-button" (click)="toggle()" aria-label="Notificaciones">
    <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
      <path d="M10 18a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 10 18Zm6-5V9a6 6 0 1 0-12 0v4l-1.2 1.6A.9.9 0 0 0 3.52 16h12.96a.9.9 0 0 0 .72-1.4L16 13Z" />
    </svg>
    @if (notificationsService.noLeidas() > 0) {
      <span class="badge">{{ notificationsService.noLeidas() > 99 ? '99+' : notificationsService.noLeidas() }}</span>
    }
  </button>

  @if (open()) {
    <section class="notification-popover" aria-label="Centro de notificaciones">
      <header class="popover-header">
        <strong>Notificaciones</strong>
        <button type="button" (click)="markAll()">Marcar todas</button>
      </header>

      @if (pushPermission() === 'default') {
        <div class="push-banner">
          <span>Activa avisos de impagos y vencimientos.</span>
          <button type="button" (click)="activatePush()">Activar</button>
        </div>
      } @else if (pushMessage()) {
        <div class="push-banner muted">{{ pushMessage() }}</div>
      }

      <div class="notification-list">
        @for (item of notificationsService.notifications().slice(0, 10); track item.id) {
          <button type="button" class="notification-row" [class.unread]="!item.leida" (click)="openNotification(item)">
            <span class="priority-dot" [class]="priorityClass(item)"></span>
            <span class="notification-copy">
              <strong>{{ item.titulo }}</strong>
              <span>{{ item.mensaje }}</span>
            </span>
            <small>{{ relativeDate(item.created_at) }}</small>
          </button>
        } @empty {
          <div class="empty-state">No hay notificaciones</div>
        }
      </div>

      <a class="all-link" routerLink="/notificaciones" (click)="open.set(false)">Ver todas</a>
    </section>
  }
</div>
