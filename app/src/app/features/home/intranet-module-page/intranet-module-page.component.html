<main class="module-layout">
  <app-intranet-shell-header
    [pageTitle]="title"
    pageSubtitle="Módulo conectado desde el panel estadístico central."
    [activeRoute]="activeRoute"
    [employeeName]="employeeName"
    [links]="navigationLinks"
    (logoutClick)="openLogoutModal()">
  </app-intranet-shell-header>

  <section class="module-container">
    <section class="module-card">
      <h2>{{ title }}</h2>
      <p>Este módulo usa la navegación común y quedará ampliado en siguientes iteraciones.</p>
      <a routerLink="/home">Volver al panel principal</a>
    </section>
  </section>
</main>

@if (showLogoutModal()) {
  <div class="logout-modal-backdrop" (click)="cancelLogout()" role="dialog" aria-modal="true" aria-labelledby="logout-title">
    <div class="logout-modal" (click)="$event.stopPropagation()">
      <h3 id="logout-title">¿Cerrar sesión?</h3>
      <p>¿Estás seguro de que quieres cerrar sesión? Se perderá la sesión activa.</p>
      <div class="logout-modal-actions">
        <button type="button" class="btn-cancel" (click)="cancelLogout()">Cancelar</button>
        <button type="button" class="btn-confirm" (click)="confirmLogout()">Cerrar sesión</button>
      </div>
    </div>
  </div>
}
