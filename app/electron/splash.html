<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestorIA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #2d5a45;
      font-family: "Plus Jakarta Sans", "Segoe UI", -apple-system, sans-serif;
      user-select: none;
      overflow: hidden;
      -webkit-app-region: drag;
      transition: opacity 0.6s ease;
    }

    /* ── Banner ocupa todo el fondo ─────────── */
    .banner {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* ── Overlay en la zona inferior ─────────── */
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 36px 28px;
      background: linear-gradient(to top, rgba(15,27,45,0.72) 0%, transparent 100%);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      transition: color 0.2s;
    }
    .status.error { color: #f87171; }

    .percent {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .progress-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #a8c5b0, #ffffff);
      border-radius: 99px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

  </style>
</head>
<body>
  <img class="banner" src="../public/app-banner.png" alt=""
       onerror="document.body.style.background='#2d5a45'" />

  <div class="footer">
    <div class="progress-header">
      <span class="status" id="status">Iniciando…</span>
      <span class="percent" id="percent">0%</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="bar"></div>
    </div>
  </div>

  <script>
    const bar     = document.getElementById('bar');
    const status  = document.getElementById('status');
    const percent = document.getElementById('percent');

    function updateProgress(pct, text) {
      bar.style.width = pct + '%';
      percent.textContent = Math.round(pct) + '%';
      if (text) status.textContent = text;
      status.classList.remove('error');
    }

    function showDone() {
      bar.style.background = 'linear-gradient(90deg, #4ade80, #bbf7d0)';
      bar.style.width = '100%';
      percent.textContent = '100%';
      status.textContent = '¡Todo listo!';
      // Fade-out suave antes de cerrar el splash
      setTimeout(() => {
        document.body.style.opacity = '0';
      }, 300);
    }

    function showError(msg) {
      bar.style.background = '#f87171';
      bar.style.width = '100%';
      status.classList.add('error');
      status.textContent = msg;
    }
  </script>
</body>
</html>
