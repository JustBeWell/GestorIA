upstream svc_auth      { server backend-auth:8008; }
upstream svc_home      { server backend-home:8008; }
upstream svc_fichaje   { server backend-fichaje:8008; }
upstream svc_clientes  { server backend-clientes:8008; }
upstream svc_trabajos  { server backend-trabajos:8008; }
upstream svc_pagos     { server backend-pagos:8008; }
upstream svc_admin     { server backend-admin:8008; }
upstream svc_ai        { server backend-ai:8008; }

server {
    listen 8008;

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_next_upstream   error timeout;

    # ── Auth & Users ──────────────────────────────────────────────────────────
    location ~ ^/auth(/|$)  { proxy_pass http://svc_auth; }
    location ~ ^/users(/|$) { proxy_pass http://svc_auth; }

    # ── Home & Series ─────────────────────────────────────────────────────────
    location ~ ^/intranet/home(/|$)   { proxy_pass http://svc_home; }
    location ~ ^/intranet/series(/|$) { proxy_pass http://svc_home; }

    # ── Fichaje ───────────────────────────────────────────────────────────────
    location ~ ^/intranet/fichaje(/|$) { proxy_pass http://svc_fichaje; }

    # ── Clientes ──────────────────────────────────────────────────────────────
    location ~ ^/intranet/clientes(/|$) { proxy_pass http://svc_clientes; }

    # ── Trabajos ──────────────────────────────────────────────────────────────
    location ~ ^/intranet/trabajos(/|$) { proxy_pass http://svc_trabajos; }

    # ── Pagos (pagos, deuda, facturas) ────────────────────────────────────────
    location ~ ^/intranet/(pagos|deuda|facturas)(/|$) { proxy_pass http://svc_pagos; }

    # ── Admin ─────────────────────────────────────────────────────────────────
    location ~ ^/intranet/admin(/|$) { proxy_pass http://svc_admin; }

    # ── AI ────────────────────────────────────────────────────────────────────
    location ~ ^/ai(/|$) { proxy_pass http://svc_ai; }

    # ── Gateway health ────────────────────────────────────────────────────────
    location = /gateway/health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","gateway":"nginx"}';
    }
}
