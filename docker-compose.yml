x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  depends_on:
    db:
      condition: service_healthy
  environment:
    POSTGRES_HOST: db
    POSTGRES_PORT: 5432
    POSTGRES_DB: GestorIA
    POSTGRES_USER: gestoria
    POSTGRES_PASSWORD: gestoria
    POSTGRES_SSLMODE: disable
    DATABASE_URL: postgresql://gestoria:gestoria@db:5432/GestorIA?sslmode=disable
    JWT_SECRET_KEY: dev-secret-change-me
    JWT_ALGORITHM: HS256
    JWT_EXPIRATION_HOURS: 8
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
    TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
    TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    GIA_STORAGE_DIR: /data/gia
    PUSH_VAPID_PUBLIC_KEY: ${PUSH_VAPID_PUBLIC_KEY:-}
    PUSH_VAPID_PRIVATE_KEY: ${PUSH_VAPID_PRIVATE_KEY:-}
    PUSH_VAPID_SUBJECT: ${PUSH_VAPID_SUBJECT:-mailto:gestor@gestoria.es}
    INTERNAL_EVENTS_HMAC_SECRET: ${INTERNAL_EVENTS_HMAC_SECRET:-dev-internal-events-secret}
    NOTIFICATIONS_RETENTION_DAYS: ${NOTIFICATIONS_RETENTION_DAYS:-365}
    TASK_DEADLINE_DAYS_AHEAD: ${TASK_DEADLINE_DAYS_AHEAD:-3,1}
    NOTIF_OUTBOX_BATCH_SIZE: ${NOTIF_OUTBOX_BATCH_SIZE:-100}
    NOTIF_OUTBOX_MAX_RETRIES: ${NOTIF_OUTBOX_MAX_RETRIES:-5}
    TIMEZONE: ${TIMEZONE:-Europe/Madrid}

services:
  db:
    image: postgres:17-alpine
    container_name: gestoria-db
    environment:
      POSTGRES_DB: POSTGRES_DB
      POSTGRES_USER: POSTGRES_USER
      POSTGRES_PASSWORD: POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/V001__schema_inicial.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./db/migrations/V011__calendario_fiscal.sql:/docker-entrypoint-initdb.d/011_calendario_fiscal.sql:ro
      - ./db/migrations/V012__gia_portal.sql:/docker-entrypoint-initdb.d/012_gia_portal.sql:ro
      - ./db/migrations/V013__calendario_asesoria_fiscal_laboral.sql:/docker-entrypoint-initdb.d/013_calendario_asesoria_fiscal_laboral.sql:ro
      - ./db/migrations/V015__notifications.sql:/docker-entrypoint-initdb.d/015_notifications.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestoria -d GestorIA"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── Backend microservices ──────────────────────────────────────────────────

  backend-auth:
    <<: *backend-common
    container_name: gestoria-backend-auth
    command: ["uvicorn", "main_auth:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-home:
    <<: *backend-common
    container_name: gestoria-backend-home
    command: ["uvicorn", "main_home:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-fichaje:
    <<: *backend-common
    container_name: gestoria-backend-fichaje
    command: ["uvicorn", "main_fichaje:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-clientes:
    <<: *backend-common
    container_name: gestoria-backend-clientes
    command: ["uvicorn", "main_clientes:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-trabajos:
    <<: *backend-common
    container_name: gestoria-backend-trabajos
    command: ["uvicorn", "main_trabajos:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-pagos:
    <<: *backend-common
    container_name: gestoria-backend-pagos
    command: ["uvicorn", "main_pagos:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-calendario:
    <<: *backend-common
    container_name: gestoria-backend-calendario
    command: ["uvicorn", "main_calendario:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-admin:
    <<: *backend-common
    container_name: gestoria-backend-admin
    command: ["uvicorn", "main_admin:app", "--host", "0.0.0.0", "--port", "8008"]

  backend-ai:
    <<: *backend-common
    container_name: gestoria-backend-ai
    command: ["uvicorn", "main_ai:app", "--host", "0.0.0.0", "--port", "8008"]
    volumes:
      - gia_data:/data/gia

  backend-notifications:
    <<: *backend-common
    container_name: gestoria-backend-notifications
    command: ["uvicorn", "main_notifications:app", "--host", "0.0.0.0", "--port", "8008"]

  # ── API Gateway ────────────────────────────────────────────────────────────

  gateway:
    image: nginx:1.27-alpine
    container_name: gestoria-gateway
    depends_on:
      - backend-auth
      - backend-home
      - backend-fichaje
      - backend-clientes
      - backend-trabajos
      - backend-pagos
      - backend-calendario
      - backend-admin
      - backend-ai
      - backend-notifications
    ports:
      - "8008:8008"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend-electron:
    build:
      context: ./app
      dockerfile: Dockerfile.electron
    container_name: gestoria-frontend-electron
    depends_on:
      - gateway
    volumes:
      - ./app/dist:/app/dist
    restart: "no"

volumes:
  postgres_data:
  gia_data:
