<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestorIA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      color: #f8fafc;
      user-select: none;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 44px 52px 36px;
      gap: 0;
    }

    /* ── Logo ────────────────────────────────── */
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: contain;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
    }

    .logo-fallback {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
    }

    /* ── Title ───────────────────────────────── */
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }

    .tagline {
      color: #475569;
      font-size: 13px;
      margin-bottom: 42px;
      transition: color 0.3s;
    }

    /* ── Steps ───────────────────────────────── */
    .steps {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #334155;
      transition: color 0.3s;
    }

    .step-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1e293b;
      border: 1.5px solid #334155;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }

    .step.active .step-dot  { background: #3b82f6; border-color: #3b82f6; }
    .step.active            { color: #94a3b8; }
    .step.done .step-dot    { background: #22c55e; border-color: #22c55e; }
    .step.done              { color: #64748b; }

    /* ── Progress bar ────────────────────────── */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: #1e293b;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 99px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-bar.pulse::after {
      content: '';
      display: block;
      height: 100%;
      background: rgba(255,255,255,0.35);
      animation: pulse-shine 1.4s ease-in-out infinite;
    }

    @keyframes pulse-shine {
      0%   { width: 0%;   margin-left: 0;   opacity: 1; }
      80%  { width: 60%;  margin-left: 40%; opacity: 0; }
      100% { width: 60%;  margin-left: 40%; opacity: 0; }
    }

    /* ── Status text ─────────────────────────── */
    .status {
      color: #334155;
      font-size: 12px;
      height: 16px;
      transition: color 0.2s;
    }

    .status.error { color: #ef4444; }

    /* ── Version ─────────────────────────────── */
    .version {
      position: absolute;
      bottom: 14px;
      font-size: 11px;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      class="logo"
      src="../public/app-logo.png"
      alt="GestorIA"
      onerror="this.style.display='none'; document.getElementById('lf').style.display='flex';"
    />
    <div class="logo-fallback" id="lf">G</div>

    <h1>GestorIA</h1>
    <p class="tagline" id="tagline">Preparando la aplicación…</p>

    <div class="steps" id="steps">
      <div class="step" id="step-db">
        <div class="step-dot"></div>Base de datos
      </div>
      <div class="step" id="step-api">
        <div class="step-dot"></div>Backend API
      </div>
      <div class="step" id="step-ui">
        <div class="step-dot"></div>Interfaz
      </div>
      <div class="step" id="step-launch">
        <div class="step-dot"></div>Inicio
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar pulse" id="bar"></div>
    </div>
    <p class="status" id="status">Verificando dependencias…</p>
  </div>
  <p class="version">v1.0</p>

  <script>
    const bar    = document.getElementById('bar');
    const status = document.getElementById('status');
    const tagline = document.getElementById('tagline');

    // Called from main.cjs via executeJavaScript
    function updateProgress(pct, text, stepId) {
      bar.style.width = pct + '%';
      if (text)   status.textContent = text;
      if (stepId) activateStep(stepId);
      status.classList.remove('error');
    }

    function activateStep(id) {
      // Mark previous steps done
      const order = ['step-db', 'step-api', 'step-ui', 'step-launch'];
      const idx = order.indexOf(id);
      order.forEach((s, i) => {
        const el = document.getElementById(s);
        el.classList.remove('active', 'done');
        if (i < idx)  el.classList.add('done');
        if (i === idx) el.classList.add('active');
      });
    }

    function showDone() {
      bar.classList.remove('pulse');
      bar.style.background = 'linear-gradient(90deg, #22c55e, #4ade80)';
      bar.style.width = '100%';
      status.textContent = 'Listo';
      tagline.textContent = 'Abriendo GestorIA…';
      tagline.style.color = '#22c55e';
      const order = ['step-db', 'step-api', 'step-ui', 'step-launch'];
      order.forEach(s => {
        const el = document.getElementById(s);
        el.classList.remove('active');
        el.classList.add('done');
      });
    }

    function showError(msg) {
      bar.classList.remove('pulse');
      bar.style.background = '#ef4444';
      bar.style.width = '100%';
      status.classList.add('error');
      status.textContent = msg;
      tagline.textContent = 'Error al iniciar';
      tagline.style.color = '#ef4444';
    }
  </script>
</body>
</html>
