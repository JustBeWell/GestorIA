# ── CORS origin whitelist ─────────────────────────────────────────────────────
map $http_origin $cors_origin {
    default                                         "";
    ~^app://                                        $http_origin;
    "http://localhost:4200"                         $http_origin;
    "http://127.0.0.1:4200"                         $http_origin;
    ~^https?://(localhost|127\.0\.0\.1)(:\d+)?$     $http_origin;
}

# ── Routing: URI → backend ─────────────────────────────────────────────────────
map $uri $svc {
    ~^/auth                              http://backend-auth:8008;
    ~^/users                             http://backend-auth:8008;
    ~^/intranet/admin                    http://backend-admin:8008;
    ~^/intranet/notifications            http://backend-notifications:8008;
    ~^/intranet/fichaje                  http://backend-fichaje:8008;
    ~^/intranet/clientes                 http://backend-clientes:8008;
    ~^/intranet/trabajos                 http://backend-trabajos:8008;
    ~^/intranet/(pagos|deuda|facturas)   http://backend-pagos:8008;
    ~^/intranet/calendario-fiscal        http://backend-calendario:8008;
    ~^/intranet/home                     http://backend-home:8008;
    ~^/intranet/series                   http://backend-home:8008;
    ~^/ai                                http://backend-ai:8008;
    ~^/internal/events                   http://backend-notifications:8008;
    default                              "";
}

server {
    listen 8008;

    # Docker embedded DNS — resuelve en tiempo de petición, no al arrancar nginx
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Gateway health (exact match tiene prioridad sobre regex) ──────────────
    location = /gateway/health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","gateway":"nginx"}';
    }

    location = /internal/events {
        return 403;
    }

    # Calendario fiscal: ruta explicita con resolucion dinamica de Docker.
    # El gateway puede vivir mas que los backends y no debe cachear IPs antiguas.
    location ^~ /intranet/calendario-fiscal {
        set $calendario_upstream http://backend-calendario:8008;

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"        always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Max-Age           86400 always;
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        proxy_pass $calendario_upstream;
    }

    # ── Catch-all: CORS + routing dinámico ────────────────────────────────────
    location ~ / {
        # Cabeceras CORS para respuestas normales (proxy)
        # Nota: cuando el bloque if de OPTIONS tiene add_header propios,
        # estos no se añaden en ese camino — es el comportamiento correcto.
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;

        # Preflight OPTIONS: responder aquí sin tocar el upstream
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"        always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Max-Age           86400 always;
            return 204;
        }

        # Ruta no reconocida
        if ($svc = "") { return 404; }

        # Suprimir CORS del upstream para evitar cabeceras duplicadas
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        proxy_pass $svc;
    }
}
